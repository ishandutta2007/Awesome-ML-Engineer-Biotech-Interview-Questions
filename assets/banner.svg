<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
    <style>
      .text-title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 34px; font-weight: 800; fill: url(#textGrad); }
      .text-subtitle { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: 400; fill: #8b949e; }
      
      @keyframes float1 { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
      @keyframes float2 { 0% { transform: translateY(-10px); } 50% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
      
      .node1 { animation: float1 3s ease-in-out infinite; fill: #58a6ff; }
      .node2 { animation: float2 3s ease-in-out infinite; fill: #3fb950; }
      .link { stroke: #30363d; stroke-width: 2; }
    </style>
  </defs>
  
  <rect width="800" height="200" rx="10" fill="url(#grad1)" />
  
  <text x="40" y="90" class="text-title">Machine Learning Engineer</text>
  <text x="40" y="130" class="text-subtitle">Biotech / Pharma Interview Questions 🧬⚙️</text>

  <!-- Network/DNA nodes -->
  <g transform="translate(550, 40)">
    <line x1="50" y1="20" x2="100" y2="50" class="link" />
    <line x1="100" y1="50" x2="150" y2="30" class="link" />
    <line x1="50" y1="90" x2="100" y2="50" class="link" />
    <line x1="150" y1="80" x2="100" y2="50" class="link" />
    
    <circle cx="50" cy="20" r="8" class="node1" />
    <circle cx="100" cy="50" r="12" class="node2" />
    <circle cx="150" cy="30" r="8" class="node1" />
    <circle cx="50" cy="90" r="8" class="node2" />
    <circle cx="150" cy="80" r="10" class="node1" />
    
    <!-- Connect back -->
    <line x1="50" y1="20" x2="50" y2="90" class="link" stroke-dasharray="4,4" />
    <line x1="150" y1="30" x2="150" y2="80" class="link" stroke-dasharray="4,4" />
  </g>
</svg>
